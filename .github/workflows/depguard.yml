name: Depguard

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  depguard:
    name: Run Depguard
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for diff scope

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build depguard
        run: cargo build --release -p depguard-cli

      - name: Create artifacts directory
        run: mkdir -p artifacts/depguard

      - name: Run depguard
        id: depguard_run
        shell: bash
        run: |
          set +e
          ./target/release/depguard ci github \
            --event "${{ github.event_name }}" \
            --out-dir artifacts/depguard \
            --report-out artifacts/depguard/report.json \
            --write-markdown \
            --emit-annotations

          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"

          if [ "$code" -eq 1 ]; then
            echo "::error::Depguard encountered a runtime/tooling error."
          elif [ "$code" -eq 2 ]; then
            echo "::warning::Depguard found policy violations."
          fi

          # Defer failing to the final enforcement step so annotations/artifacts always run.
          exit 0

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: depguard-report
          path: artifacts/depguard/
          retention-days: 90

      - name: Add job summary
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/depguard/comment.md ]; then
            {
              echo "## Depguard Report"
              echo
              cat artifacts/depguard/comment.md
            } >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## Depguard Report"
              echo "No report generated."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const commentPath = 'artifacts/depguard/comment.md';

            if (!fs.existsSync(commentPath)) {
              console.log('No comment file found');
              return;
            }

            const body = fs.readFileSync(commentPath, 'utf8');

            // Find existing depguard comment
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Depguard')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Enforce depguard exit code
        if: always()
        shell: bash
        run: |
          code="${{ steps.depguard_run.outputs.exit_code }}"

          if [ -z "$code" ]; then
            echo "::error::Depguard did not return an exit code."
            exit 1
          fi

          if [ "$code" -eq 0 ]; then
            echo "Depguard passed."
            exit 0
          fi

          if [ "$code" -eq 2 ]; then
            echo "::error::Depguard found policy violations."
            exit 2
          fi

          echo "::error::Depguard failed with exit code $code."
          exit 1
