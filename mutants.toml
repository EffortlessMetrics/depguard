# Configuration for cargo-mutants
# 
# Usage:
#   cargo mutants                                    # Run on all workspace crates
#   cargo mutants --package depguard-domain          # Run on specific crate
#   cargo mutants --package depguard-domain-checks   # Run on check implementations
#   cargo mutants --package depguard-settings        # Run on config parsing
#
# Recommended crates for mutation testing (pure business logic):
#   - depguard-domain         : Core domain logic, policy evaluation
#   - depguard-domain-checks  : Individual check implementations
#   - depguard-settings       : Configuration parsing and validation

[default]
# Allow more time for complex tests
timeout_multiplier = 3

# Exclude test files from mutation
[[exclude_globs]]
glob = "**/*_test*.rs"

[[exclude_globs]]
glob = "**/tests/**"

[[exclude_globs]]
glob = "**/proptest*.rs"

# Exclude test support files (test helpers, not production code)
[[exclude_globs]]
glob = "**/test_support.rs"
